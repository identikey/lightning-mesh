<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
			CSP-clean / offline note: this template must never gain a link/script
			pointing at an external host (no CDNs, no Google Fonts, no analytics).
			The mesh may have zero internet access. Everything ships same-origin
			via the bundled build output.
		-->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

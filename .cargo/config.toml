# Cross-compilation targets for OpenWrt devices

# GL.iNet AXT1800 (Slate AX) - Qualcomm IPQ6000, ARMv8 Cortex-A53
[target.aarch64-unknown-linux-musl]
# linker = "aarch64-linux-musl-gcc"

# GL.iNet SFT1200 (Opal) - Siflower SF19A28, MIPS32 LE
[target.mipsel-unknown-linux-musl]
# linker = "mipsel-openwrt-linux-musl-gcc"

# MikroTik L23UGSR-5HaxD2HaxD (NetMetal ax / L-series) - Qualcomm IPQ-5010,
# ARMv7 32-bit (RouterOS runs this chip in 32-bit mode). Deployed via RouterOS
# container as a static musl binary (linux/arm/v7). See docs/deploy/.
# The deploy/mikrotik Dockerfile cross-builds via messense/rust-musl-cross,
# which bundles the toolchain; uncomment below only for a host-local build.
[target.armv7-unknown-linux-musleabihf]
# linker = "armv7l-linux-musleabihf-gcc"

# Optimize for size on embedded targets
[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"

# mjolnir-mesh fleet inventory — the maintainer's bootstrap/recovery node list
# (docs/deploy/node-operations.md: the CRDT announcement [buw.9] will be the
# LIVE inventory; this file is the hand-kept ground truth it boots from).
#
# Format (pipe-separated, one node per line, # comments):
#   name|backhaul_addr|node_id|model|notes
#
# - backhaul_addr is DERIVED: 10.254.<blake3(node_id)>/16 — it never changes
#   for a given node id. Confirm with: ssh root@<addr> 'service mjolnir-meshd diag'
# - update-fleet.sh walks this file TOP TO BOTTOM: order it leaf-first and put
#   the usually-wired jump node LAST, so a halted rollout never strands the
#   nodes behind an already-updated transit hop.
# - a node fresh from the flash is NOT in here yet: provision it with
#   install-node.sh over ethernet first, then add its line.


# mjolnir-mesh fleet inventory — the maintainer's bootstrap/recovery node list
# (docs/deploy/node-operations.md: the CRDT announcement [buw.9] will be the
# LIVE inventory; this file is the hand-kept ground truth it boots from).
#
# Format (pipe-separated, one node per line, # comments):
#   name|backhaul_addr|node_id|model|notes
#
# - backhaul_addr is DERIVED: 10.254.<blake3(node_id)>/16 — stable for a given
#   node id UNLESS the node lost a backhaul-address collision (pt9): the loser
#   re-derives to a salted next slot, recorded in its persisted /32 claim.
#   `mjolnir-meshd status` prints the effective address and flags a re-derived
#   one; update this line if a node ever moves. Confirm with:
#   ssh root@<addr> 'service mjolnir-meshd diag'
# - update-fleet.sh walks this file TOP TO BOTTOM: order it leaf-first and put
#   the usually-wired jump node LAST, so a halted rollout never strands the
#   nodes behind an already-updated transit hop.
# - a node fresh from the flash is NOT in here yet: provision it with
#   install-node.sh over ethernet first, then add its line.
# - every node's /etc/config/mjolnir must 'list peer' ALL other nodes (full
#   set, not a chain): a node whose only bootstrap peer is offline becomes a
#   gossip ISLAND — babel still routes, but the CRDT plane (claims, addrbook)
#   goes dark. Flattened fleet-wide 2026-07-03 during the 0yb rollout; when a
#   node is added here, add its id to every other node's peer list (bead m4a
#   tracks automating this).


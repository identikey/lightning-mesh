name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicitly configure permissions, in case the GITHUB_TOKEN defaults are set to read-only.
permissions:
  actions: write
  contents: read      # we store signatures in a separate branch via PERSONAL_ACCESS_TOKEN
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A Personal Access Token (repo scope) is required so signatures can be
          # committed to the signatures branch below. Add it as a repo secret
          # named PERSONAL_ACCESS_TOKEN. See CONTRIBUTING.md.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/identikey/lightning-mesh/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],*[bot]'
          remote-organization-name: 'identikey'
          remote-repository-name: 'lightning-mesh'
          custom-notsigned-prcomment: >
            Thank you for your contribution to **Lightning Mesh**! Before we can
            merge, please read our [Contributor License Agreement](https://github.com/identikey/lightning-mesh/blob/main/CLA.md)
            and sign it by posting a comment on this PR with exactly:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. ✅
